spring.application.name=backend
spring.config.import=optional:file:./application-local.properties
spring.datasource.url=jdbc:postgresql://localhost:5433/shopsense_db
spring.datasource.username=shopsense_user
spring.datasource.password=shopsense_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=shopsense-development-secret-key-change-this-later-123456
jwt.expiration-ms=86400000

shopsense.admin.email=${SHOPSENSE_ADMIN_EMAIL:}
shopsense.admin.password=${SHOPSENSE_ADMIN_PASSWORD:}
shopsense.admin.name=${SHOPSENSE_ADMIN_NAME:Admin}

gemini.api-key=${GEMINI_API_KEY:}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.chat-model=gemini-2.5-flash

huggingface.api-key=${HUGGINGFACE_API_KEY:}
huggingface.embedding-url=https://router.huggingface.co/hf-inference/models/sentence-transformers/all-MiniLM-L6-v2/pipeline/feature-extraction
